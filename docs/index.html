<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/Tanglish/">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Learn Telugu through real-life English conversations">
  <!-- COPPA: prevent search indexing of a children's app -->
  <meta name="robots" content="noindex, nofollow">

  <!--
    Content-Security-Policy
    ─────────────────────────────────────────────────────────────────────────
    Restricts resource loading to prevent XSS and data injection attacks.
    Adjust 'connect-src' if you add additional Firebase regions.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline' 'wasm-unsafe-eval' blob:
                https://www.gstatic.com
                https://apis.google.com
                https://accounts.google.com;
    style-src   'self' 'unsafe-inline'
                https://fonts.googleapis.com;
    font-src    'self'
                https://fonts.gstatic.com;
    img-src     'self' data: https: blob:;
    media-src   'self' blob: https:;
    worker-src  'self' blob:;
    connect-src 'self'
                https://www.gstatic.com
                https://*.googleapis.com
                https://*.firebaseio.com
                https://*.cloudfunctions.net
                wss://*.firebaseio.com;
    frame-src   https://accounts.google.com
                https://*.firebaseapp.com;
    object-src  'none';
    base-uri    'self';
    form-action 'self';
  ">

  <title>Tanglish</title>
  <!-- Google Sign-In client ID — replace with real value from Firebase console -->
  <meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Noto Sans Telugu loaded locally via pubspec.yaml assets/fonts/ -->

  <style>
    /* Prevent flash of unstyled content */
    body { margin: 0; background-color: #6C63FF; }
  </style>
</head>
<body>
  <!-- Flutter bootstrapper -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
